# Build the book on pull requests to validate changes
name: Pull Request CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build book with mdBook
        run: |
          nix-shell '<nixpkgs>' -p mdbook --command 'mdbook build'

      - name: Check for build artifacts
        run: |
          if [ ! -d "book" ] || [ ! -f "book/index.html" ]; then
            echo "Error: Build did not produce expected output"
            exit 1
          fi
          echo "✓ Book built successfully"
